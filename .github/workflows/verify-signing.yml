name: verify-signing

# Manual smoke test for the release signing secrets. Run it from the Actions tab (or
# `gh workflow run verify-signing.yml`) to confirm KEYSTORE_BASE64 / KEYSTORE_PASSWORD /
# KEY_ALIAS / KEY_PASSWORD actually produce a validly signed APK — without cutting a release.
# Builds the release APK, verifies the signature, and uploads it as a build artifact (no release).

on:
  workflow_dispatch:

jobs:
  verify-signing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Verify APK is signed
        run: |
          apksigner="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner"
          apk=$(ls app/build/outputs/apk/release/*.apk | head -1)
          "$apksigner" verify --verbose --print-certs "$apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: app/build/outputs/apk/release/*.apk
